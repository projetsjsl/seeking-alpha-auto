name: Parse Stock Data with Claude

on:
  push:
    paths:
      - 'stock_analysis.json'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Parse with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'NODESCRIPT'
          const fs = require('fs');
          
          async function callClaude(rawText, ticker) {
            const cleanText = rawText.substring(0, 40000);
            
            const prompt = `Tu es un analyste financier expert. Analyse ce contenu Seeking Alpha Virtual Analyst Report et génère un rapport structuré COMPLET en français.

STRUCTURE EXACTE REQUISE (comme exemple JNJ):

1. MÉTRIQUES CLÉS:
   - Capitalisation Boursière
   - Croissance du BPA (prévisionnel)
   - Ration C/B (P/E prévisionnel)
   - Secteur
   - Rendement du dividende (prévisionnel)
   - Fréquence du dividende
   - Date ex-dividende (dernier)
   - Versement annuel (prévisionnel)

2. PROFIL DE L'ENTREPRISE:
   - Description complète de l'entreprise (historique, activités, segments)
   - Nombre d'employés et diversité
   - Capacités d'innovation et R&D

3. CONCURRENCE ET POSITIONNEMENT:
   - Concurrents principaux
   - Proposition de valeur unique
   - Avantages compétitifs

4. ANALYSE QUANTITATIVE (Seeking Alpha):
   - Évaluation: Note (A+, A, B, C, D, F avec +/-)
   - Croissance: Note
   - Rentabilité: Note
   - Momentum: Note
   - Révisions: Note

5. ANALYSE COMPARATIVE SECTORIELLE:
   Pour chaque métrique (Évaluation, Croissance, Rentabilité, Momentum, Révisions):
   - Comparaison détaillée vs secteur avec chiffres précis
   - Explication de la performance

6. CONCLUSION INTERMÉDIAIRE:
   - Synthèse de la rentabilité et momentum
   - Note sur la croissance et valorisation
   - Recommandation (Conserver/Acheter/Vendre)

7. POINTS POSITIFS DES ANALYSTES:
   - 3 points forts détaillés avec sources

8. POINTS DE PRÉOCCUPATION:
   - 3 préoccupations détaillées avec sources

9. CONCLUSION SEEKING ALPHA:
   - Forces principales
   - Faiblesses principales
   - Recommandation finale (Conserver/Acheter/Vendre avec justification)

CONTENU À ANALYSER:
${cleanText}

RÉPONDS UNIQUEMENT AVEC CE JSON:
{
  "ticker": "${ticker}",
  "companyName": "",
  "lastUpdate": "${new Date().toISOString()}",
  "metrics": {
    "marketCap": "",
    "bpaGrowth": "",
    "peRatio": "",
    "sector": "",
    "dividendYield": "",
    "dividendFrequency": "",
    "exDivDate": "",
    "annualPayout": "",
    "price": "",
    "priceChange": ""
  },
  "companyProfile": {
    "description": "",
    "employees": "",
    "innovation": ""
  },
  "competition": {
    "competitors": [],
    "valueProposition": "",
    "advantages": ""
  },
  "quantRating": {
    "valuation": "",
    "growth": "",
    "profitability": "",
    "momentum": "",
    "revisions": ""
  },
  "sectorAnalysis": {
    "valuation": "",
    "growth": "",
    "profitability": "",
    "momentum": "",
    "revisions": ""
  },
  "intermediateConclusion": "",
  "strengths": ["", "", ""],
  "concerns": ["", "", ""],
  "finalConclusion": {
    "strengths": "",
    "weaknesses": "",
    "recommendation": "",
    "rating": "Hold"
  }
}`;

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01"
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 4096,
                messages: [{ role: "user", content: prompt }]
              })
            });

            if (!response.ok) {
              const error = await response.text();
              throw new Error("API " + response.status + ": " + error);
            }
            
            const data = await response.json();
            let text = data.content[0].text.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
            return JSON.parse(text);
          }

          async function main() {
            console.log("Lecture stock_analysis.json...");
            const stockAnalysis = JSON.parse(fs.readFileSync('stock_analysis.json', 'utf8'));
            const parsedStocks = {};

            for (const stock of stockAnalysis.stocks) {
              if (stock.raw_text) {
                console.log("Parsing " + stock.ticker + "...");
                try {
                  const parsed = await callClaude(stock.raw_text, stock.ticker);
                  parsedStocks[stock.ticker] = parsed;
                  console.log("Succès " + stock.ticker);
                  await new Promise(r => setTimeout(r, 3000));
                } catch (error) {
                  console.error("Erreur " + stock.ticker + ":", error.message);
                  parsedStocks[stock.ticker] = { 
                    ticker: stock.ticker, 
                    error: error.message
                  };
                }
              }
            }

            fs.writeFileSync('stock_data.json', JSON.stringify({
              lastUpdate: new Date().toISOString(),
              stocks: parsedStocks
            }, null, 2));
            console.log("
