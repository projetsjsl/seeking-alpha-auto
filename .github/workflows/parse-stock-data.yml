name: Parse Stock Data with Claude

on:
  push:
    paths:
      - 'stock_analysis.json'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Parse with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          async function callClaude(rawText, ticker) {
            const prompt = `Analyse ce contenu Seeking Alpha et extrais les données au format JSON strict.

          DONNÉES: prix, variation, cap, P/E, secteur, dividende (yield, fréquence, ex-date, payout), Quant Ratings (valuation, growth, profitability, momentum, revisions), description, concurrents, points positifs (3), préoccupations (3), recommandation.

          CONTENU:
          ${rawText.substring(0, 45000)}

          FORMAT JSON:
          {
            "ticker": "${ticker}",
            "companyName": "...",
            "price": "$XX.XX",
            "priceChange": "+X.XX (+X.XX%)",
            "marketCap": "$XXB",
            "peRatio": "XX.XX",
            "sector": "...",
            "dividend": {"yield": "X.XX%", "frequency": "Quarterly", "exDivDate": "MM/DD/YYYY", "annualPayout": "$X.XX"},
            "quantRating": {"overall": "Hold", "valuation": "A-", "growth": "D-", "profitability": "A+", "momentum": "B+", "revisions": "B+"},
            "description": "...",
            "competitors": ["..."],
            "strengths": ["..."],
            "concerns": ["..."],
            "recommendation": {"rating": "Hold", "justification": "..."},
            "scrapedAt": "${new Date().toISOString()}"
          }`;

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": process.env.ANTHROPIC_API_KEY
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 4000,
                messages: [{ role: "user", content: prompt }]
              })
            });

            if (!response.ok) throw new Error(`API error: ${response.status}`);
            const data = await response.json();
            let text = data.content[0].text.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
            return JSON.parse(text);
          }

          async function main() {
            const stockAnalysis = JSON.parse(fs.readFileSync('stock_analysis.json', 'utf8'));
            const parsedStocks = {};

            for (const stock of stockAnalysis.stocks) {
              if (stock.raw_text) {
                console.log(`Parsing ${stock.ticker}...`);
                try {
                  const parsed = await callClaude(stock.raw_text, stock.ticker);
                  parsedStocks[stock.ticker] = parsed;
                  await new Promise(r => setTimeout(r, 2000));
                } catch (error) {
                  console.error(`Error parsing ${stock.ticker}:`, error);
                  parsedStocks[stock.ticker] = { ticker: stock.ticker, error: error.message };
                }
              }
            }

            fs.writeFileSync('stock_data.json', JSON.stringify({
              lastUpdate: new Date().toISOString(),
              stocks: parsedStocks
            }, null, 2));
            console.log('Parsing complete!');
          }

          main().catch(console.error);
          EOF
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-parse stock data"
          git push
