<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seeking Alpha Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SeekingAlphaDashboard = () => {
          const [githubToken, setGithubToken] = useState(localStorage.getItem('github_token') || '');
          const [showSettings, setShowSettings] = useState(!localStorage.getItem('github_token'));
          const [tickers, setTickers] = useState([]);
          const [stockData, setStockData] = useState({});
          const [newTicker, setNewTicker] = useState('');
          const [loading, setLoading] = useState(false);
          const [message, setMessage] = useState(null);
          const [selectedStock, setSelectedStock] = useState(null);

          const GITHUB_REPO = 'projetsjsl/seeking-alpha-auto';
          const GITHUB_BRANCH = 'main';

          const showMessage = (text, type = 'info') => {
            setMessage({ text, type });
            setTimeout(() => setMessage(null), 5000);
          };

          const githubFetch = async (path, options = {}) => {
            const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`;
            const headers = {
              'Authorization': `token ${githubToken}`,
              'Accept': 'application/vnd.github.v3+json',
              ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
            return response.json();
          };

          const getFileContent = async (path) => {
            try {
              const data = await githubFetch(path);
              return JSON.parse(atob(data.content));
            } catch (error) {
              return null;
            }
          };

          const updateFile = async (path, content, commitMessage) => {
            try {
              let sha = null;
              try {
                const existing = await githubFetch(path);
                sha = existing.sha;
              } catch (e) {}
              const body = {
                message: commitMessage,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                branch: GITHUB_BRANCH
              };
              if (sha) body.sha = sha;
              await githubFetch(path, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
              });
              return true;
            } catch (error) {
              throw error;
            }
          };

          const loadData = async () => {
            if (!githubToken) return;
            setLoading(true);
            try {
              const tickersData = await getFileContent('tickers.json');
              if (tickersData) {
                setTickers(tickersData.tickers || []);
              } else {
                await updateFile('tickers.json', { tickers: [] }, 'Initialize tickers.json');
                setTickers([]);
              }
              const stocksData = await getFileContent('stock_data.json');
              if (stocksData) {
                setStockData(stocksData.stocks || {});
              }
              showMessage('Données chargées avec succès', 'success');
            } catch (error) {
              showMessage('Erreur chargement', 'error');
            } finally {
              setLoading(false);
            }
          };

          const addTicker = async () => {
            if (!newTicker.trim()) return;
            const ticker = newTicker.trim().toUpperCase();
            if (tickers.includes(ticker)) {
              showMessage('Ticker existe déjà', 'warning');
              return;
            }
            setLoading(true);
            try {
              const newTickers = [...tickers, ticker];
              await updateFile('tickers.json', { tickers: newTickers }, `Add ticker ${ticker}`);
              setTickers(newTickers);
              setNewTicker('');
              showMessage(`${ticker} ajouté`, 'success');
            } catch (error) {
              showMessage('Erreur ajout', 'error');
            } finally {
              setLoading(false);
            }
          };

          const removeTicker = async (ticker) => {
            if (!confirm(`Supprimer ${ticker} ?`)) return;
            setLoading(true);
            try {
              const newTickers = tickers.filter(t => t !== ticker);
              await updateFile('tickers.json', { tickers: newTickers }, `Remove ${ticker}`);
              setTickers(newTickers);
              const newStockData = { ...stockData };
              delete newStockData[ticker];
              setStockData(newStockData);
              showMessage(`${ticker} supprimé`, 'success');
            } catch (error) {
              showMessage('Erreur suppression', 'error');
            } finally {
              setLoading(false);
            }
          };

          const saveSettings = () => {
            localStorage.setItem('github_token', githubToken);
            setShowSettings(false);
            loadData();
            showMessage('Configuration sauvegardée', 'success');
          };

          useEffect(() => {
            if (githubToken && !showSettings) {
              loadData();
            }
          }, [githubToken, showSettings]);

          const getGradeColor = (grade) => {
            if (!grade) return 'bg-gray-100 text-gray-600';
            const letter = grade.charAt(0);
            if (letter === 'A') return 'bg-green-100 text-green-700';
            if (letter === 'B') return 'bg-blue-100 text-blue-700';
            if (letter === 'C') return 'bg-yellow-100 text-yellow-700';
            if (letter === 'D') return 'bg-orange-100 text-orange-700';
            if (letter === 'F') return 'bg-red-100 text-red-700';
            return 'bg-gray-100 text-gray-600';
          };

          const getRatingColor = (rating) => {
            if (!rating) return 'bg-gray-500';
            const r = rating.toLowerCase();
            if (r.includes('buy') || r.includes('acheter')) return 'bg-green-500';
            if (r.includes('hold') || r.includes('conserver')) return 'bg-yellow-500';
            if (r.includes('sell') || r.includes('vendre')) return 'bg-red-500';
            return 'bg-gray-500';
          };

          if (showSettings) {
            return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-8' },
              React.createElement('div', { className: 'max-w-2xl mx-auto bg-white rounded-lg shadow-xl p-8' },
                React.createElement('h1', { className: 'text-3xl font-bold text-gray-800 mb-6' }, 'Configuration'),
                React.createElement('div', { className: 'space-y-6' },
                  React.createElement('div', null,
                    React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-2' }, 'GitHub Token'),
                    React.createElement('input', {
                      type: 'password',
                      value: githubToken,
                      onChange: (e) => setGithubToken(e.target.value),
                      placeholder: 'ghp_xxxxxxxxxxxxxxxxxxxx',
                      className: 'w-full px-4 py-3 border border-gray-300 rounded-lg'
                    })
                  ),
                  React.createElement('button', {
                    onClick: saveSettings,
                    disabled: !githubToken,
                    className: 'w-full bg-blue-600 text-white py-3 rounded-lg'
                  }, 'Sauvegarder')
                )
              )
            );
          }

          return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-4' },
            message && React.createElement('div', {
              className: `fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg z-50 ${
                message.type === 'success' ? 'bg-green-500' :
                message.type === 'error' ? 'bg-red-500' :
                message.type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500'
              } text-white font-medium`
            }, message.text),

            React.createElement('div', { className: 'max-w-7xl mx-auto mb-8' },
              React.createElement('div', { className: 'flex items-center justify-between mb-6' },
                React.createElement('h1', { className: 'text-4xl font-bold text-white' }, 'Seeking Alpha Dashboard'),
                React.createElement('div', { className: 'flex gap-3' },
                  React.createElement('button', {
                    onClick: () => setShowSettings(true),
                    className: 'px-4 py-2 bg-slate-700 text-white rounded-lg'
                  }, 'Paramètres'),
                  React.createElement('button', {
                    onClick: loadData,
                    disabled: loading,
                    className: 'px-4 py-2 bg-slate-700 text-white rounded-lg'
                  }, 'Actualiser')
                )
              ),

              React.createElement('div', { className: 'bg-slate-800 rounded-lg p-6 mb-6' },
                React.createElement('h2', { className: 'text-xl font-bold text-white mb-4' }, 'Gestion des Tickers'),
                React.createElement('div', { className: 'flex gap-3 mb-6' },
                  React.createElement('input', {
                    type: 'text',
                    value: newTicker,
                    onChange: (e) => setNewTicker(e.target.value.toUpperCase()),
                    onKeyPress: (e) => e.key === 'Enter' && addTicker(),
                    placeholder: 'Ex: MSFT, GOOGL...',
                    className: 'flex-1 px-4 py-2 rounded-lg bg-slate-700 text-white'
                  }),
                  React.createElement('button', {
                    onClick: addTicker,
                    disabled: loading,
                    className: 'px-6 py-2 bg-blue-600 text-white rounded-lg'
                  }, 'Ajouter')
                ),
                React.createElement('div', { className: 'flex flex-wrap gap-2' },
                  tickers.map(ticker =>
                    React.createElement('div', {
                      key: ticker,
                      className: 'flex items-center gap-2 bg-slate-700 px-4 py-2 rounded-lg'
                    },
                      React.createElement('span', { className: 'text-white font-medium' }, ticker),
                      React.createElement('button', {
                        onClick: () => removeTicker(ticker),
                        className: 'text-red-400'
                      }, '×')
                    )
                  )
                )
              )
            ),

            React.createElement('div', { className: 'max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
              tickers.map(ticker => {
                const data = stockData[ticker];
                if (!data || data.error) {
                  return React.createElement('div', {
                    key: ticker,
                    className: 'bg-slate-800 rounded-lg p-6'
                  },
                    React.createElement('h3', { className: 'text-2xl font-bold text-white mb-4' }, ticker),
                    React.createElement('p', { className: 'text-slate-400' }, data?.error || 'Pas de données')
                  );
                }

                const rating = data.finalConclusion?.rating || 'Hold';
                
                return React.createElement('div', {
                  key: ticker,
                  onClick: () => setSelectedStock(ticker),
                  className: 'bg-slate-800 rounded-lg p-6 hover:bg-slate-750 cursor-pointer transition-all hover:scale-105 shadow-lg'
                },
                  React.createElement('div', { className: 'flex items-start justify-between mb-4' },
                    React.createElement('div', null,
                      React.createElement('h3', { className: 'text-2xl font-bold text-white' }, ticker),
                      React.createElement('p', { className: 'text-sm text-slate-400' }, data.companyName || 'N/A')
                    ),
                    React.createElement('div', {
                      className: `${getRatingColor(rating)} text-white text-xs font-bold px-3 py-1 rounded-full`
                    }, rating)
                  ),

                  data.metrics?.price && React.createElement('div', { className: 'mb-4' },
                    React.createElement('div', { className: 'text-2xl font-bold text-white' }, data.metrics.price),
                    React.createElement('div', {
                      className: `text-sm ${data.metrics.priceChange?.includes('+') ? 'text-green-400' : 'text-red-400'}`
                    }, data.metrics.priceChange)
                  ),

                  React.createElement('div', { className: 'space-y-2 mb-4' },
                    React.createElement('div', { className: 'flex justify-between text-sm' },
                      React.createElement('span', { className: 'text-slate-400' }, 'Market Cap'),
                      React.createElement('span', { className: 'text-white' }, data.metrics?.marketCap || 'N/A')
                    ),
                    React.createElement('div', { className: 'flex justify-between text-sm' },
                      React.createElement('span', { className: 'text-slate-400' }, 'P/E'),
                      React.createElement('span', { className: 'text-white' }, data.metrics?.peRatio || 'N/A')
                    )
                  ),

                  data.quantRating && React.createElement('div', { className: 'grid grid-cols-3 gap-2' },
                    Object.entries(data.quantRating).slice(1, 4).map(([key, value]) =>
                      React.createElement('div', { key: key, className: 'text-center' },
                        React.createElement('div', { className: 'text-xs text-slate-400 mb-1' }, key.substring(0, 4)),
                        React.createElement('div', {
                          className: `${getGradeColor(value)} px-2 py-1 rounded text-xs font-bold`
                        }, value)
                      )
                    )
                  ),

                  React.createElement('div', {
                    className: 'mt-4 pt-4 border-t border-slate-700 text-xs text-slate-500 text-center'
                  }, 'Cliquez pour le rapport complet')
                );
              })
            ),

            selectedStock && stockData[selectedStock] && React.createElement('div', {
              className: 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4',
              onClick: () => setSelectedStock(null)
            },
              React.createElement('div', {
                className: 'bg-white rounded-lg max-w-4xl max-h-[90vh] overflow-y-auto w-full',
                onClick: (e) => e.stopPropagation()
              },
                React.createElement('div', {
                  className: 'sticky top-0 bg-white border-b p-6 flex justify-between items-center'
                },
                  React.createElement('h2', { className: 'text-3xl font-bold' },
                    `${selectedStock} - ${stockData[selectedStock].companyName}`
                  ),
                  React.createElement('button', {
                    onClick: () => setSelectedStock(null),
                    className: 'p-2 hover:bg-gray-100 rounded'
                  }, '×')
                ),
                
                React.createElement('div', { className: 'p-6 space-y-6' },
                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Métriques Clés'),
                    React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                      React.createElement('div', null, React.createElement('strong', null, 'Capitalisation: '),
                        stockData[selectedStock].metrics?.marketCap
                      ),
                      React.createElement('div', null, React.createElement('strong', null, 'Croissance BPA: '),
                        stockData[selectedStock].metrics?.bpaGrowth
                      ),
                      React.createElement('div', null, React.createElement('strong', null, 'P/E: '),
                        stockData[selectedStock].metrics?.peRatio
                      ),
                      React.createElement('div', null, React.createElement('strong', null, 'Secteur: '),
                        stockData[selectedStock].metrics?.sector
                      ),
                      React.createElement('div', null, React.createElement('strong', null, 'Dividende: '),
                        stockData[selectedStock].metrics?.dividendYield
                      )
                    )
                  ),

                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Profil Entreprise'),
                    React.createElement('p', { className: 'text-gray-700' },
                      stockData[selectedStock].companyProfile?.description
                    )
                  ),

                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Quant Ratings'),
                    React.createElement('div', { className: 'grid grid-cols-5 gap-4' },
                      Object.entries(stockData[selectedStock].quantRating || {}).map(([key, value]) =>
                        React.createElement('div', { key: key, className: 'text-center' },
                          React.createElement('div', {
                            className: 'text-sm text-gray-600 mb-2 capitalize'
                          }, key),
                          React.createElement('div', {
                            className: `${getGradeColor(value)} px-4 py-2 rounded-lg font-bold`
                          }, value)
                        )
                      )
                    )
                  ),

                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Points Positifs'),
                    React.createElement('ul', { className: 'list-disc list-inside space-y-2' },
                      (stockData[selectedStock].strengths || []).map((s, i) =>
                        React.createElement('li', { key: i }, s)
                      )
                    )
                  ),

                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Préoccupations'),
                    React.createElement('ul', { className: 'list-disc list-inside space-y-2' },
                      (stockData[selectedStock].concerns || []).map((c, i) =>
                        React.createElement('li', { key: i }, c)
                      )
                    )
                  ),

                  React.createElement('section', null,
                    React.createElement('h3', {
                      className: 'text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-900 pb-2'
                    }, 'Conclusion'),
                    React.createElement('div', {
                      className: 'bg-blue-50 border-l-4 border-blue-500 p-4'
                    },
                      React.createElement('p', { className: 'font-bold text-lg mb-2' },
                        'Recommandation: ', stockData[selectedStock].finalConclusion?.rating
                      ),
                      React.createElement('p', null,
                        stockData[selectedStock].finalConclusion?.recommendation
                      )
                    )
                  )
                )
              )
            )
          );
        };

        ReactDOM.render(React.createElement(SeekingAlphaDashboard), document.getElementById('root'));
    </script>
</body>
</html>
